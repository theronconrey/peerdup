# peerdup-daemon configuration
# Copy to config.toml and edit.

[daemon]
name        = "my-nas"
data_dir    = "/var/lib/peerdup"
socket_path = "/run/peerdup/control.sock"
listen_port = 55000

[registry]
address = "registry.example.com:50051"
tls     = true
ca_file = "/etc/peerdup/ca.crt"
# Uncomment for mTLS:
# cert_file = "/etc/peerdup/client.crt"
# key_file  = "/etc/peerdup/client.key"

[identity]
key_file = "/var/lib/peerdup/identity.key"
name     = "my-nas"

[libtorrent]
listen_interfaces   = "0.0.0.0:55000"
upload_rate_limit   = 0   # bytes/sec, 0 = unlimited
download_rate_limit = 0

[lan]
enabled           = true
interface         = ""           # bind interface IP, empty = all (auto)
announce_interval = 30           # seconds between LAN broadcasts
multicast_group   = "239.193.0.0"
multicast_port    = 49152

[logging]
level = "INFO"

# Shares can be listed here for static config,
# OR added at runtime via: peerdup share add <share_id> <path>

# [[shares]]
# share_id   = "AXyz..."       # base58 pubkey from registry
# local_path = "/mnt/nas/photos"
# permission = "rw"             # rw | ro | encrypted

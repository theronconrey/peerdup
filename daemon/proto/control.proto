syntax = "proto3";

package control.v1;

// ── Share status ──────────────────────────────────────────────────────────────

message ShareStatus {
  string share_id          = 1;  // base58 Ed25519 pubkey
  string name              = 2;
  string local_path        = 3;
  string state             = 4;  // "syncing" | "seeding" | "paused" | "error"
  uint64 bytes_total       = 5;
  uint64 bytes_done        = 6;
  int32  peers_online      = 7;  // registry-announced peers (known to exist)
  string last_error        = 8;
  string info_hash         = 9;  // current libtorrent info-hash (hex)
  string conflict_strategy = 10; // "last_write_wins" | "rename_conflict" | "ask"
  string mode              = 11; // "registry" | "local"
  int32  lt_peers          = 12; // active libtorrent connections right now
  int32  upload_rate       = 13; // bytes/sec (current aggregate)
  int32  download_rate     = 14; // bytes/sec (current aggregate)
}

// ── Share management ──────────────────────────────────────────────────────────

message AddShareRequest {
  string share_id          = 1;  // share_id to join
  string local_path        = 2;  // absolute path to sync directory (created if absent)
  string permission        = 3;  // "rw" | "ro" | "encrypted"
  string conflict_strategy = 4;  // "last_write_wins" | "rename_conflict" | "ask" (default: last_write_wins)
  bool   local_only        = 5;  // if true, skip registry validation - LAN discovery only
}

message AddShareResponse {
  ShareStatus share = 1;
}

message RemoveShareRequest {
  string share_id    = 1;
  bool   delete_files = 2;  // if true, rm -rf local_path after removing share
}

message RemoveShareResponse {}

message ListSharesRequest {}

message ListSharesResponse {
  repeated ShareStatus shares = 1;
}

// ── Identity ──────────────────────────────────────────────────────────────────

message IdentityRequest {}

message IdentityResponse {
  string peer_id = 1;  // base58 Ed25519 pubkey
  string name    = 2;
}

// ── Daemon status / streaming ─────────────────────────────────────────────────

message StatusRequest {}

message StatusEvent {
  enum EventType {
    EVENT_TYPE_UNSPECIFIED  = 0;
    EVENT_TYPE_SHARE_UPDATED = 1;  // share state changed
    EVENT_TYPE_PEER_EVENT   = 2;  // peer came online / went offline
    EVENT_TYPE_SYNC_PROGRESS = 3; // bytes_done updated
    EVENT_TYPE_ERROR        = 4;  // non-fatal error
    EVENT_TYPE_CONFLICT     = 5;  // conflict detected (ask strategy)
  }
  EventType   type        = 1;
  ShareStatus share       = 2;  // populated for SHARE_UPDATED / SYNC_PROGRESS
  string      message     = 3;  // human-readable detail
  int32       conflict_id = 4;  // populated for CONFLICT events
}

// ── Conflict strategy ─────────────────────────────────────────────────────────

message SetConflictStrategyRequest {
  string share_id          = 1;
  string conflict_strategy = 2;  // "last_write_wins" | "rename_conflict" | "ask"
}

message SetConflictStrategyResponse {
  string share_id          = 1;
  string conflict_strategy = 2;
}

// ── Conflict management ───────────────────────────────────────────────────────

message ConflictInfo {
  int32  conflict_id       = 1;
  string share_id          = 2;
  string remote_peer_id    = 3;  // peer whose content conflicts with ours
  string remote_info_hash  = 4;  // their torrent hash
  string local_info_hash   = 5;  // our torrent hash at detection time
  string detected_at       = 6;  // ISO-8601 timestamp
}

message ListConflictsRequest {
  string share_id = 1;
}

message ListConflictsResponse {
  repeated ConflictInfo conflicts = 1;
}

message ResolveConflictRequest {
  int32  conflict_id = 1;
  string resolution  = 2;  // "keep-local" | "keep-remote"
}

message ResolveConflictResponse {
  int32  conflict_id = 1;
  string resolution  = 2;
}

// ── Create share ─────────────────────────────────────────────────────────────

message CreateShareRequest {
  string name              = 1;  // human-readable label
  string local_path        = 2;  // absolute path to sync directory (created if absent)
  string permission        = 3;  // "rw" | "ro" | "encrypted" (own permission, default rw)
  string import_key_hex    = 4;  // hex-encoded 32-byte Ed25519 seed to import; empty = generate new
  string conflict_strategy = 5;  // "last_write_wins" | "rename_conflict" | "ask" (default: last_write_wins)
  bool   local_only        = 6;  // if true, skip registry - LAN discovery only
}

message CreateShareResponse {
  ShareStatus share    = 1;
  string      share_id = 2;  // base58 pubkey — hand this to peers
}

// ── Grant access ──────────────────────────────────────────────────────────────

message GrantAccessRequest {
  string share_id   = 1;  // share to grant access to
  string peer_id    = 2;  // recipient's base58 pubkey (from: peerdup identity)
  string permission = 3;  // "rw" | "ro" | "encrypted" (default "rw")
}

message GrantAccessResponse {
  string share_id   = 1;
  string peer_id    = 2;
  string permission = 3;
}

// ── Revoke access ─────────────────────────────────────────────────────────────

message RevokeAccessRequest {
  string share_id = 1;
  string peer_id  = 2;
}

message RevokeAccessResponse {}

// ── Peer roster ──────────────────────────────────────────────────────────────

message SharePeerInfo {
  string peer_id      = 1;  // base58 Ed25519 pubkey
  string name         = 2;  // human-readable name (from registry)
  string permission   = 3;  // "rw" | "ro" | "encrypted"
  bool   online       = 4;  // true if TTL-live announcement exists
  bool   is_self      = 5;  // true if this is the local peer
  bool   is_owner     = 6;  // true if this peer created the share
  string last_seen    = 7;  // ISO-8601 timestamp or "" if never seen
  repeated string addresses = 8;  // "host:port" strings, empty if offline
  // libtorrent active connection stats (populated if online + active transfer)
  int32  download_rate = 9;   // bytes/sec
  int32  upload_rate   = 10;  // bytes/sec
}

message ListSharePeersRequest {
  string share_id = 1;
}

message ListSharePeersResponse {
  string                   share_id      = 1;
  string                   share_name    = 2;
  repeated SharePeerInfo   peers         = 3;
  int32                    total_granted = 4;  // total peers with ACL entry
  int32                    total_online  = 5;  // peers currently announcing
}

// ── Share info ────────────────────────────────────────────────────────────────

message GetShareInfoRequest {
  string share_id = 1;
}

message GetShareInfoResponse {
  string share_id     = 1;
  string name         = 2;
  string local_path   = 3;
  string state        = 4;   // "syncing" | "seeding" | "paused" | "error"
  string permission   = 5;   // this peer's own permission level
  bool   is_owner     = 6;
  string owner_id     = 7;   // peer_id of share creator (from registry)
  string created_at   = 8;   // ISO-8601 timestamp (from registry)
  uint64 bytes_total       = 9;
  uint64 bytes_done        = 10;
  string info_hash         = 11;  // libtorrent info-hash (hex)
  int32  peers_online      = 12;  // peers currently announcing
  int32  total_peers       = 13;  // total peers with ACL access
  string last_error        = 14;
  int64  upload_limit      = 15;  // bytes/sec, 0 = unlimited
  int64  download_limit    = 16;  // bytes/sec, 0 = unlimited
  string conflict_strategy = 17;  // "last_write_wins" | "rename_conflict" | "ask"
  int32  pending_conflicts = 18;  // number of unresolved conflicts (ask strategy only)
}

// ── Rate limits ───────────────────────────────────────────────────────────────

message SetShareRateLimitRequest {
  string share_id       = 1;
  int64  upload_limit   = 2;  // bytes/sec, 0 = unlimited
  int64  download_limit = 3;  // bytes/sec, 0 = unlimited
}

message SetShareRateLimitResponse {
  string share_id       = 1;
  int64  upload_limit   = 2;
  int64  download_limit = 3;
}

// ── Pause / resume ────────────────────────────────────────────────────────────

message PauseShareRequest  { string share_id = 1; }
message PauseShareResponse {}

message ResumeShareRequest  { string share_id = 1; }
message ResumeShareResponse {}

// ── Service ───────────────────────────────────────────────────────────────────

service ControlService {
  // Share lifecycle
  rpc CreateShare   (CreateShareRequest)  returns (CreateShareResponse);
  rpc AddShare      (AddShareRequest)     returns (AddShareResponse);
  rpc RemoveShare   (RemoveShareRequest)  returns (RemoveShareResponse);
  rpc ListShares    (ListSharesRequest)   returns (ListSharesResponse);
  rpc PauseShare    (PauseShareRequest)   returns (PauseShareResponse);
  rpc ResumeShare   (ResumeShareRequest)  returns (ResumeShareResponse);

  // Share info
  rpc GetShareInfo      (GetShareInfoRequest)       returns (GetShareInfoResponse);

  // Rate limits
  rpc SetShareRateLimit (SetShareRateLimitRequest)  returns (SetShareRateLimitResponse);

  // Conflict strategy
  rpc SetConflictStrategy (SetConflictStrategyRequest) returns (SetConflictStrategyResponse);

  // Conflict management (ask strategy)
  rpc ListConflicts    (ListConflictsRequest)   returns (ListConflictsResponse);
  rpc ResolveConflict  (ResolveConflictRequest) returns (ResolveConflictResponse);

  // Peer roster
  rpc ListSharePeers (ListSharePeersRequest) returns (ListSharePeersResponse);

  // Access control
  rpc GrantAccess   (GrantAccessRequest)  returns (GrantAccessResponse);
  rpc RevokeAccess  (RevokeAccessRequest) returns (RevokeAccessResponse);

  // Identity
  rpc ShowIdentity  (IdentityRequest)     returns (IdentityResponse);

  // Status
  rpc Status        (StatusRequest)       returns (StatusEvent);
  rpc WatchStatus   (StatusRequest)       returns (stream StatusEvent);
}

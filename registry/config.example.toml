# peerdup-registry configuration
# Copy to config.toml and edit for your deployment.

host         = "0.0.0.0"
port         = 50051
database_url = "sqlite:///registry.db"
log_level    = "INFO"
max_workers  = 10

[tls]
# TLS is enabled by default. Generate dev certs with: make cert
# Set enabled = false only for loopback-only development setups.
enabled   = true
cert_file = "server.crt"
key_file  = "server.key"

# Uncomment to require client certificates (mTLS).
# Generate client certs with: make client-cert
# ca_file = "server.crt"

[rate_limit]
# Maximum announces per minute per peer per share (token bucket).
# Set to 0 to disable rate limiting.
announce_per_minute = 30

[audit]
# Structured JSON audit log of every authenticated action.
# Disabled by default -- enable for production deployments.
enabled      = false
log_file     = "audit.log"   # relative to CWD or absolute path
# max_bytes    = 10485760     # 10 MB per file (default)
# backup_count = 5            # keep 5 rotated files (default)

[metrics]
# Prometheus /metrics endpoint. Requires: pip install prometheus-client
# Disabled by default -- enable for production deployments.
enabled = false
port    = 9090
